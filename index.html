<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero Navigator 2026</title>

        /* 프루티거 에어로 디자인 시스템 */
        :root {
            --glass: rgba(255, 255, 255, 0.45);
            --aero-blue: #0084ff;
            --aero-green: #2ecc71;
            --glossy: linear-gradient(to bottom, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Malgun Gothic', sans-serif;
            background: url('https://images.unsplash.com/photo-1500673922987-e212871fec22?auto=format&fit=crop&q=80&w=2070') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        #app-container {
            display: flex;
            height: 100vh;
            backdrop-filter: blur(5px);
        }

        /* 왼쪽 사이드바: 검색 및 저장 */
        #side-panel {
            width: 380px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-right: 1px solid rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 0 0 40px rgba(0,0,0,0.1);
        }

        .glass-header {
            padding: 30px 20px;
            background: var(--glossy);
            border-bottom: 1px solid rgba(255,255,255,0.3);
            text-align: center;
        }

        h1 {
            color: #0056b3;
            margin: 0 0 15px 0;
            font-style: italic;
            text-shadow: 1px 1px 10px rgba(255,255,255,0.8);
        }

        .search-group {
            display: flex;
            gap: 10px;
            background: rgba(255,255,255,0.5);
            padding: 5px;
            border-radius: 30px;
            border: 1px solid white;
        }

        input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px 15px;
            outline: none;
            font-size: 14px;
        }

        .btn-search {
            background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
            border: none;
            border-radius: 20px;
            padding: 8px 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 장소 리스트 디자인 */
        #result-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
